{% extends "base.html" %} {% block title %}Register | FastAPI Login System{%
endblock %} {% block content %}

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create Account 🚀</h1>
      <p>Create your account to get started.</p>
    </div>

    <form id="registerForm" action="/auth/register-form" method="POST">
      <!-- Full Name -->
      <div class="form-group">
        <label for="full_name">Full Name</label>

        <input
          type="text"
          id="full_name"
          name="full_name"
          value="{{ full_name or '' }}"
          placeholder="Enter your full name"
          required
        />
      </div>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>

        <input
          type="text"
          id="username"
          name="username"
          value="{{ username or '' }}"
          placeholder="Choose a username"
          required
        />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>

        <input
          type="email"
          id="email"
          name="email"
          value="{{ email or '' }}"
          placeholder="Enter your email"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>

        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            required
          />

          <button
            type="button"
            class="toggle-password"
            onclick="togglePassword('password', this)"
          >
            👁
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm_password"> Confirm Password </label>

        <div class="password-wrapper">
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Confirm your password"
            required
          />

          <button
            type="button"
            class="toggle-password"
            onclick="togglePassword('confirm_password', this)"
          >
            👁
          </button>
        </div>
      </div>

      <!-- Terms -->
      <div class="remember-row">
        <label class="remember">
          <input type="checkbox" required />

          I agree to the
          <a href="#">Terms & Conditions</a>
        </label>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-full">
        Create Account
      </button>
    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="social-login">
      <button class="btn btn-google" type="button">Continue with Google</button>

      <button class="btn btn-github" type="button">Continue with GitHub</button>
    </div>

    <div class="auth-footer">
      <p>
        Already have an account?

        <a href="/auth/login"> Login </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
