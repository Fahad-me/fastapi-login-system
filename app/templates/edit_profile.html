{% extends "base.html" %} {% block title %} Edit Profile {% endblock %} {% block
content %}

<div class="container">
  <!-- Page Navigation -->
  <a href="/users/profile" class="back-btn"> ← Back to Profile </a>

  <div class="edit-profile-page">
    <div class="edit-profile-card">
      <div class="profile-header">
        <div class="profile-avatar">{{ user.full_name[0] }}</div>

        <h1>Edit Profile</h1>

        <p class="profile-subtitle">Update your account information</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <!-- Form Starts Here -->

      <form
        action="/users/edit-profile"
        method="POST"
        class="edit-profile-form"
      >
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input
            type="text"
            id="full_name"
            name="full_name"
            value="{{ user.full_name }}"
            required
          />
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            value="{{ user.username }}"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            value="{{ user.email }}"
            required
          />
        </div>

        <div class="profile-actions">
          <button type="submit" class="btn btn-primary">💾 Save Changes</button>

          <a href="/users/profile" class="btn btn-secondary"> Cancel </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
